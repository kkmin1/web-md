<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Premium Markdown Editor</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@5.1.2/lib/index.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="LatexTable.js"></script>
    <script src="script.js"></script>


    <style>
        /* 표 주변의 여백이나 그림자 등 추가 디자인 (선택 사항) */
        .latex-table-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="gradient-text">Nova</span> Markdown
            </div>
            <div class="actions">
                <button id="open-btn" class="secondary-btn" title="파일 불러오기">
                    파일 불러오기
                </button>
                <button id="save-btn" title="파일 저장하기">
                    파일 저장하기
                </button>
                <button id="copy-btn" title="Copy for Google Keep (Preserves Bold, Headings)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    Copy for Keep
                </button>
                <div class="status-indicator" id="status">Syncing...</div>
            </div>
        </header>
        <input type="file" id="file-input" accept=".md,.svg,text/markdown,text/plain,image/svg+xml" hidden>

        <main>
            <section class="editor-pane">
                <div class="pane-header">
                    <span>Editor</span>
                    <span class="language">Markdown</span>
                </div>
                <textarea id="markdown-input" placeholder="Type your markdown here..." spellcheck="false">

<br>
Block math: $$f(x) = \int_{-\infty}^\infty \hat{f}(\xi) e^{2\pi i \xi x} d\xi$$

이 행렬의 고유값이 $\alpha$와 $\beta$이며, 대각화를 통해 일반항을 유도할 수 있습니다.

행렬:

\begin{bmatrix}
a & b \\
c & d
\end{bmatrix}
